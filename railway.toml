# Serviço: Frontend (Expo web build + Nginx)
# Configure este arquivo no serviço "frontend" do Railway.
# O Railway usa o Dockerfile.frontend na raiz do repositório.

[build]
  builder = "DOCKERFILE"
  dockerfilePath = "Dockerfile.frontend"

[deploy]
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10
