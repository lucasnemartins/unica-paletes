server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy de requisições ao backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# Bloco para redirecionar HTTP para HTTPS para aplicativo.app-unicapaletes.com
server {
    listen 80;
    listen [::]:80;
    server_name aplicativo.app-unicapaletes.com;
    return 301 https://$server_name$request_uri;
}

# Bloco para redirecionar HTTP para HTTPS para api.app-unicapaletes.com
server {
    listen 80;
    listen [::]:80;
    server_name api.app-unicapaletes.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS para aplicativo.app-unicapaletes.com
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name aplicativo.app-unicapaletes.com;

    ssl_certificate /etc/letsencrypt/live/aplicativo.app-unicapaletes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aplicativo.app-unicapaletes.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 50M;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy de requisições ao backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy para arquivos de upload
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# HTTPS para api.app-unicapaletes.com
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.app-unicapaletes.com;

    ssl_certificate /etc/letsencrypt/live/api.app-unicapaletes.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.app-unicapaletes.com-0001/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 50M;

    # Proxy de requisições ao backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy para arquivos de upload
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Settings
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public";
    }

    # Serve os arquivos estáticos com cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|ttf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public";
    }

    # Proxy de requisições ao backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

 